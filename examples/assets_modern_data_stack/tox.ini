[tox]
requires =
    tox-uv>=1.16
skipsdist = true

[testenv]
runner = uv-venv-lock-runner
uv_sync_locked = false
uv_sync_flags = --frozen
download = True
passenv =
    CI_*
    BUILDKITE*
    PYTEST_ADDOPTS
    PYTEST_PLUGINS
# Only the `source` factor is supported under the per-package-lock workflow.
# The legacy `pypi` factor used to install dagster from PyPI under
# temp_pins.txt constraints, but it conflicts with the project's
# `[tool.uv].override-dependencies = ["dagster==1!0+dev"]` (which forces
# resolution to the local dagster source — required for the source-factor
# lockfile to even resolve given dagster-cloud's pypi pin). Pypi-install
# coverage for examples should be tested via a different mechanism.
dependency_groups =
    source: test
allowlist_externals =
  /bin/bash
  uv
commands =
  source: /bin/bash -c '! uv pip list --exclude-editable | grep -e dagster'
  pytest -vv
