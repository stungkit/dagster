# ########################
# ##### TY (Type Checker)
# ########################

# [Docs root]
#   https://docs.astral.sh/ty/
# [Configuration reference]
#   https://docs.astral.sh/ty/configuration/

# Note: Most ty configuration is handled dynamically by scripts/run-ty.py,
# which passes CLI arguments for include/exclude paths and Python environment.
# This section provides defaults for direct ty invocations.

[tool.ty.environment]
# Minimum version of Python on which code must run.
python-version = "3.10"

# Extra paths to use as module-resolution sources
extra-paths = [
  ".buildkite/buildkite-shared"
]

[tool.ty.rules]
# ty is configured as a "strict mode" tool for selective use on specific files/packages.
# It reports 10-100x more diagnostics than pyright because:
#   1. pyright's `useLibraryCodeForTypes = false` treats untyped code as Any
#   2. ty performs comprehensive type inference even on untyped dependencies
#
deprecated = "ignore"  # Deprecation warnings across dependencies
possibly-missing-attribute = "ignore"  # High false positive rate
possibly-missing-import = "ignore"  # Often incorrect in complex imports

[tool.ty.src]

include = [
  # This doesn't exist but we need something here to prevent ty from
  # complaining about an empty include list. Remove with first package added
  # here.
  "__placeholder__"
]

exclude = [
  # Example notebook intentionally references undefined names as placeholders.
  "python_modules/libraries/dagstermill/dagstermill/examples/notebooks/yield_something.ipynb",
  # Deliberately-malformed scaffold used as a fixture for notebook-creation tests.
  "python_modules/libraries/dagstermill/dagstermill_tests/notebooks/cli_test_scaffold.ipynb",
  # Documentation example trees contain illustrative snippets that reference
  # community / scaffolded packages not installed in this env; type-checking
  # them generates spurious unresolved-import diagnostics.
  "examples/docs_snippets",
  "examples/docs_projects",

  # There is code in dagster_graphql/implementation that as of ty 0.0.35 breaks
  # ty and causes runaway memory consumption. Tracked here:
  #   https://github.com/astral-sh/ty/issues/3445#issuecomment-4426769715
  "python_modules/dagster-graphql/dagster_graphql/implementation",

  # Vendored third-party code (croniter, dateutil).
  "python_modules/dagster/dagster/_vendored",
]

# Ignore all files that are git-ignored unless explicitly included.
respect-ignore-files = true

# Override for dagster_graphql/schema: graphene's ObjectType / Mutation /
# InputObjectType / Interface metaclass synthesizes `__init__` kwargs from
# class-body field declarations, so e.g. `GrapheneFooType(message=..., path=...)`
# is valid at runtime even though ty can't see `message` or `path` as accepted
# kwargs. graphene doesn't ship `@dataclass_transform`-decorated bases, so ty
# reports every such kwarg as `unknown-argument`. Additionally, ty 0.0.35 doesn't
# narrow pydantic discriminated unions through `match result.typename__: case 'X':`,
# causing unresolved-attribute, invalid-argument-type, and not-subscriptable
# errors across the schema files. Disable all four rules for the schema subtree.
[[tool.ty.overrides]]
include = ["python_modules/dagster-graphql/dagster_graphql/schema/**"]

[tool.ty.overrides.rules]
# graphene's ObjectType / Mutation / etc. metaclass synthesizes __init__
# from class-body fields. ty doesn't see it and flags every kwarg.
unknown-argument = "ignore"
# All three below are caused by ty 0.0.35 not narrowing pydantic
# discriminated unions through `match result.typename__: case "X":`,
# which is the dominant pattern in schema files. Revisit when ty
# adds discriminated-union narrowing.
unresolved-attribute = "ignore"
invalid-argument-type = "ignore"
not-subscriptable = "ignore"

# ########################
# ##### PYTEST
# ########################

[tool.pytest.ini_options]

# Append these options to all pytest invocations.
addopts = [
    # Treat unregistered markers as errors to avoid silent typos and ensure all markers are declared in the config. 
    "--strict-markers",  

    # Show short summary of all non-passing tests (failed, errored, skipped,
    # etc.) at the end of output.
    "-ra"
]

# Don't print any of these warnings during test runs.
filterwarnings = [
  "ignore::DeprecationWarning",
  "ignore::UserWarning",
  "ignore::pytest.PytestCollectionWarning",
]

# Custom markers for categorizing tests. These should be used in test code as
# `@pytest.mark.<marker_name>`. They can be used to select or deselect tests
# when running pytest, e.g. `pytest -m "not slow"` to run all tests except
# those marked as slow.
markers = [
  "integration: Tests requiring real git operations or other I/O",
  "slow: Tests that take more than 1 second",
]

### pytest-asyncio configuration

# Auto mode: async def test_* functions are automatically treated as async tests without
# needing @pytest.mark.asyncio on each one. Same for async fixtures.
asyncio_mode = "auto"

# Use a single event loop for the entire test session, shared across all async fixtures
# (unless a fixture explicitly declares a different scope).
asyncio_default_fixture_loop_scope = "session"

### pytest-timeout configuration

# Timeout for individual tests, in seconds. This value is intentionally large
# as it should not be the default way we catch tests that timeout. The tests
# themselves should be written such that they fail if something is taking too
# long. This is just a fallback to ensure our test suite does not hang forever.
timeout = "240"

# ########################
# ##### RUFF
# ########################
#
# The canonical ruff configuration is in ./config/ruff.toml. This file extends it with
# OSS-specific settings (excludes, per-file-ignores).

[tool.ruff]
extend = "./config/ruff.toml"

# *.py, *.ipy are included by default
extend-include = ["*.ipynb"]

extend-exclude = [
  "*/__generated__/*",
  "*/dagster_airflow/vendor/*",
  "*/_vendored/*",
  "*/snapshots/*",
  "python_modules/libraries/dagstermill/dagstermill_tests/notebooks/cli_test_scaffold.ipynb",
]

[tool.ruff.lint]

# we only want to format notebooks, not lint them
exclude = ["*.ipynb"]

[tool.ruff.lint.per-file-ignores]

# Don't format docstrings in alembic migrations.
"**/alembic/versions/*.py" = ["D"]

# Modules where it is expected for there to be no __init.py__
"**/*test*/**/" = ["INP001"]
"**/setup.py" = ["INP001"]
"**/conftest.py" = ["INP001"]
"examples/**" = ["INP001"]
"docs/**" = ["INP001"]
"**/scripts/**" = ["INP001", "T201"]  # scripts are CLI tools — print is the output channel
"python_modules/dagster/dagster/_core/storage/alembic/env.py" = ["INP001"]
"python_modules/libraries/dagster-airlift/kitchen-sink/**" = ["INP001"]
# There is an __init__.py.tmpl
"python_modules/dagster/dagster/_generate/templates/REPO_NAME_PLACEHOLDER/REPO_NAME_PLACEHOLDER/assets.py" = ["INP001"]

[tool.dagster]
module_name = "dagster_test.toys.repo"

[dependency-groups]
dev = [
    "erk>=0.6.0",
]
